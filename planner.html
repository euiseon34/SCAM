<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싸피 10분 마스터 - 코스 플래너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#f0f7ff', 500: '#1c64d0' }, darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 min-h-screen">

    <header class="sticky top-0 z-[1000] backdrop-blur-md bg-white/80 dark:bg-darkBg/80 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="p-2 bg-primary-500 rounded-xl text-white shadow-md">🗺️</div>
                <h1 class="text-sm font-bold text-slate-900 dark:text-white leading-tight hidden sm:block">싸피 서울캠퍼스 10분 마스터</h1>
            </a>
            <nav class="flex items-center space-x-8 text-sm font-medium">
                <a href="index.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🗺️ 지도 탐색</a>
                <a href="spots.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🌲 전체 스폿</a>
                <a href="planner.html" class="text-primary-500 font-bold">🧳 코스 플래너</a>
                <a href="report.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">➕ 장소 제보</a>
            </nav>
            <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">🌓 모드 전환</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12 space-y-8">
        <div class="space-y-1">
            <span class="px-2.5 py-0.5 bg-primary-500/20 text-primary-500 text-xs font-semibold rounded-full">스마트 로드 플래너</span>
            <h2 class="text-2xl font-bold tracking-tight">싸피(SSAFY) 도보 코스 메이커</h2>
            <p class="text-slate-400 text-xs">식후 가벼운 릴랙스 경로 및 점심 탈출 동선을 시뮬레이션하고 클립보드에 담아 공유해 보세요.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
            <div class="lg:col-span-8 bg-white dark:bg-darkCard rounded-2xl p-6 border border-slate-200 dark:border-slate-800 flex flex-col justify-between min-h-[240px]">
                <div id="plannerPathContainer" class="flex flex-wrap items-center gap-4 py-4">
                    </div>
                <div class="border-t border-slate-100 dark:border-slate-800 pt-4 flex justify-between items-center text-xs">
                    <div>총 경유 장소: <span id="routeCount" class="font-bold text-primary-500">0곳</span></div>
                    <div>예상 순수 도보: <span id="routeTime" class="font-bold text-primary-500">0분</span></div>
                </div>
            </div>

            <div class="lg:col-span-4 bg-white dark:bg-darkCard rounded-2xl p-6 border border-slate-200 dark:border-slate-800 flex flex-col justify-between space-y-4">
                <div class="space-y-2">
                    <h4 class="font-bold text-sm">🧳 싸피 메이트와 공유하기</h4>
                    <p class="text-xs text-slate-400 leading-relaxed">스터디 팀원들과 점심 약속을 잡거나 기분 전환하러 나갈 때 최적의 코스를 완성해 텍스트로 간편하게 공유해 보세요.</p>
                </div>
                <button onclick="sharePlan()" class="w-full py-3 bg-primary-500 text-white rounded-xl text-xs font-bold shadow-md">완성된 일정 텍스트로 내보내기</button>
                <button onclick="clearPlanner()" class="w-full py-2 bg-slate-100 dark:bg-slate-800 text-slate-500 text-xs rounded-xl">플래너 비우기</button>
            </div>
        </div>
    </main>

    <script>
        let myCourse = [];
        const plannerPathContainer = document.getElementById('plannerPathContainer');
        const routeCountText = document.getElementById('routeCount');
        const routeTimeText = document.getElementById('routeTime');

        // 로컬스토리지에서 코스 데이터 로드 및 렌더링
        function loadPlanner() {
            myCourse = JSON.parse(localStorage.getItem('ssafy_course')) || [];
            updatePlannerUI();
        }

        function updatePlannerUI() {
            plannerPathContainer.innerHTML = '';
            routeCountText.textContent = `${myCourse.length}곳`;

            if (myCourse.length === 0) {
                plannerPathContainer.innerHTML = `
                    <div class="bg-slate-100 dark:bg-slate-900 px-4 py-3 rounded-xl border text-xs text-slate-400 w-full text-center">
                        현재 담긴 장소가 없습니다. 지도 탐색 페이지에서 [코스에 담기]를 눌러 장소를 추가해 주세요!
                    </div>`;
                routeTimeText.textContent = "0분";
                return;
            }

            let totalTime = 0;
            myCourse.forEach((spot, index) => {
                totalTime += spot.time;
                
                const node = document.createElement('div');
                node.className = "relative flex items-center bg-slate-900 text-white rounded-xl px-4 py-3 shadow-md pr-10 border border-primary-500/30";
                node.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <span class="text-xs font-black bg-primary-500 text-white w-5 h-5 rounded-full flex items-center justify-center">${index + 1}</span>
                        <div>
                            <p class="text-xs font-semibold">${spot.category === 'walk' ? '🌲' : '🍲'} ${spot.title}</p>
                            <p class="text-[10px] text-slate-400">도보 약 ${spot.time}분</p>
                        </div>
                    </div>
                    <button onclick="removeSpot('${spot.id}')" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-400 p-1">✕</button>
                `;
                plannerPathContainer.appendChild(node);

                // 장소 사이사이에 화살표 추가
                if (index < myCourse.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = "text-slate-400 font-bold text-sm mx-1";
                    arrow.innerHTML = "➔";
                    plannerPathContainer.appendChild(arrow);
                }
            });

            routeTimeText.textContent = `${totalTime}분`;
        }

        // 스폿 삭제 기능
        function removeSpot(id) {
            myCourse = myCourse.filter(spot => spot.id !== id);
            localStorage.setItem('ssafy_course', JSON.stringify(myCourse));
            updatePlannerUI();
        }

        // 전체 초기화 기능
        function clearPlanner() {
            if(confirm("플래너를 비우시겠습니까?")) {
                myCourse = [];
                localStorage.removeItem('ssafy_course');
                updatePlannerUI();
            }
        }

        // 공유 텍스트 빌더 및 복사 기능
        function sharePlan() {
            if(myCourse.length === 0) {
                alert("코스에 담긴 장소가 없습니다.");
                return;
            }

            let text = "🚶‍♂️ [싸피(SSAFY) 서울캠퍼스 도보 10분 추천 코스] 🚶‍♂️\n\n";
            myCourse.forEach((spot, index) => {
                text += `${index + 1}. ${spot.title} (${spot.category === 'walk' ? '산책' : '맛집'})\n`;
                text += `   📍 주소: ${spot.address} (도보 ${spot.time}분)\n\n`;
            });
            text += `✨ 싸피 메이트와 함께 리프레시하러 떠나보세요!`;

            const tempInput = document.createElement('textarea');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);

            alert("📋 가이드 코스 일정 텍스트가 클립보드에 무사히 복사되었습니다! 카톡이나 디스코드에 공유해 보세요.");
        }

        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
        
        // 페이지 로드 시 실행
        window.onload = loadPlanner;
    </script>
</body>
</html>
