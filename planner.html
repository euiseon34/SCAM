<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싸피 10분 마스터 - 코스 플래너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#f0f7ff', 500: '#1c64d0' }, darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 min-h-screen">

    <header class="sticky top-0 z-[1000] backdrop-blur-md bg-white/80 dark:bg-darkBg/80 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="p-2 bg-primary-500 rounded-xl text-white shadow-md">🗺️</div>
                <h1 class="text-sm font-bold text-slate-900 dark:text-white leading-tight hidden sm:block">싸피 서울캠퍼스 10분 마스터</h1>
            </a>
            <nav class="flex items-center space-x-8 text-sm font-medium">
                <a href="index.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🗺️ 지도 탐색</a>
                <a href="spots.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🌲 전체 스폿</a>
                <a href="planner.html" class="text-primary-500 font-bold">🧳 코스 플래너</a>
                <a href="report.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">➕ 장소 제보</a>
            </nav>
            <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">🌓</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12 space-y-8">
        <div class="space-y-1">
            <span class="px-2.5 py-0.5 bg-primary-500/20 text-primary-500 text-xs font-semibold rounded-full">스마트 로드 플래너</span>
            <h2 class="text-2xl font-bold tracking-tight">싸피(SSAFY) 도보 코스 메이커</h2>
            <p class="text-slate-400 text-xs">식후 가벼운 릴랙스 경로 및 점심 탈출 동선을 시뮬레이션하고 클립보드에 담아 공유해 보세요.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
            <div class="lg:col-span-8 bg-white dark:bg-darkCard rounded-2xl p-6 border border-slate-200 dark:border-slate-800 flex flex-col justify-between min-h-[240px]">
                <div id="plannerPathContainer" class="flex flex-wrap items-center gap-4 py-4">
                    <div class="bg-slate-100 dark:bg-slate-900 px-4 py-3 rounded-xl border text-xs text-slate-400 w-full text-center">
                        현재 담긴 장소가 없습니다. 전체 스폿 탭에서 장소를 추가해 주세요!
                    </div>
                </div>
                <div class="border-t border-slate-100 dark:border-slate-800 pt-4 flex justify-between items-center text-xs">
                    <div>총 경유 장소: <span class="font-bold text-primary-500">0곳</span></div>
                    <div>예상 순수 도보: <span class="font-bold text-primary-500">0분</span></div>
                </div>
            </div>

            <div class="lg:col-span-4 bg-white dark:bg-darkCard rounded-2xl p-6 border border-slate-200 dark:border-slate-800 flex flex-col justify-between space-y-4">
                <div class="space-y-2">
                    <h4 class="font-bold text-sm">🧳 싸피 메이트와 공유하기</h4>
                    <p class="text-xs text-slate-400 leading-relaxed">스터디 팀원들과 점심 약속을 잡거나 기분 전환하러 나갈 때 최적의 코스를 완성해 텍스트로 간편하게 공유해 보세요.</p>
                </div>
                <button onclick="alert('가이드 계획 텍스트가 클립보드에 복사되었습니다.')" class="w-full py-3 bg-primary-500 text-white rounded-xl text-xs font-bold shadow-md">완성된 일정 텍스트로 내보내기</button>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
    </script>
</body>
</html>
