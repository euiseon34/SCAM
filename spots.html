<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싸피 10분 마스터 - 전체 스폿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#f0f7ff', 500: '#1c64d0' }, darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 min-h-screen">

    <header class="sticky top-0 z-[1000] backdrop-blur-md bg-white/80 dark:bg-darkBg/80 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="p-2 bg-primary-500 rounded-xl text-white shadow-md">🗺️</div>
                <div class="hidden sm:block">
                    <h1 class="text-sm font-bold text-slate-900 dark:text-white leading-tight">싸피 서울캠퍼스 10분 마스터</h1>
                </div>
            </a>
            <nav class="flex items-center space-x-8 text-sm font-medium">
                <a href="index.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🗺️ 지도 탐색</a>
                <a href="spots.html" class="text-primary-500 font-bold">🌲 전체 스폿</a>
                <a href="planner.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🧳 코스 플래너</a>
                <a href="report.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">➕ 장소 제보</a>
            </nav>
            <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">🌓 모드 전환</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-200 dark:border-slate-800 pb-4">
            <div>
                <h2 class="text-2xl font-bold tracking-tight">🌲 싸피 가이드 추천 전체 스폿 (<span id="spotsCount">0</span>)</h2>
                <p class="text-xs text-slate-400 mt-1">멀티캠퍼스 역삼 근처 최적의 힐링 지점들을 조건별로 탐험하세요.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="filterCategory('all')" id="btnFilterAll" class="px-4 py-2 bg-primary-500 text-white rounded-xl text-xs font-semibold">전체</button>
                <button onclick="filterCategory('walk')" id="btnFilterWalk" class="px-4 py-2 bg-white dark:bg-darkCard text-slate-600 dark:text-slate-300 rounded-xl text-xs font-semibold border">🌲 산책로</button>
                <button onclick="filterCategory('food')" id="btnFilterFood" class="px-4 py-2 bg-white dark:bg-darkCard text-slate-600 dark:text-slate-300 rounded-xl text-xs font-semibold border">🍲 맛집</button>
            </div>
        </div>

        <div id="spotsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const BASE_SPOTS = [
            { id: "spot1", title: "역삼문화공원 & 국기원 산책로", category: "walk", time: 10, address: "서울 강남구 테헤란로7길 32", direction: "멀티캠퍼스 역삼 ➡️ 국기원 고개 도보 10분", description: "싸피 서울캠퍼스에서 역삼역 언덕 방향으로 걸어 올라가면 만날 수 있는 울창한 숲속 공원입니다. 코딩으로 머리가 무거워졌을 때 식후 산책 코스로 최고입니다.", image: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=800&q=80" },
            { id: "spot2", title: "충현교회 외관 산책길", category: "walk", time: 10, address: "서울 강남구 테헤란로27길 40", direction: "멀티캠퍼스 역삼 ➡️ 학동로 방향 골목 도보 10분", description: "골목길을 걷다 보면 눈앞에 압도적인 비주얼로 나타나는 거대한 고딕풍 성당 형태의 건축물입니다. 차분하고 평화롭게 걸으며 리프레시할 수 있습니다.", image: "https://images.unsplash.com/photo-1478147427282-58a87a120781?auto=format&fit=crop&w=800&q=80" },
            { id: "spot3", title: "센터필드 조경 가로수길 & 아케이드", category: "walk", time: 5, address: "서울 강남구 테헤란로 231", direction: "멀티캠퍼스 역삼 ➡️ 르네상스 호텔 사거리 방향 도보 5분", description: "싸피 멀티캠퍼스 빌딩 바로 옆 블록에 위치한 웅장한 프리미엄 복합공간입니다. 덥거나 추운 혹한기에는 실내 아케이드에서 몰링 산책을 즐기기 좋습니다.", image: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=800&q=80" },
            { id: "spot4", title: "역삼동 북어집", category: "food", time: 6, address: "서울 강남구 논현로85길 5-14", direction: "멀티캠퍼스 역삼 ➡️ 역삼역 골목 도보 6분", description: "30년 넘은 찐 기사식당 바이브의 푸짐하고 매콤 달콤한 북어찜 백반집입니다. 회전율이 엄청나게 빨라 바쁜 싸피 점심시간에 제격입니다.", image: "https://images.unsplash.com/photo-1628840042765-356cda07504e?auto=format&fit=crop&w=800&q=80" },
            { id: "spot5", title: "지아니스나폴리 역삼본점", category: "food", time: 7, address: "서울 강남구 논현로94길 15", direction: "멀티캠퍼스 역삼 ➡️ 역삼역 7번 출구 방향 도보 7분", description: "오랫동안 미식가들의 사랑을 받고 있는 화덕 피자의 성지입니다. 쫀득하고 탄탄한 도우 식감이 일품이며, 빈티지하고 이국적인 인테리어가 특징입니다.", image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80" },
            { id: "spot6", title: "이도곰탕 본점", category: "food", time: 8, address: "서울 강남구 논현로94길 29-5", direction: "멀티캠퍼스 역삼 ➡️선릉 방향 골목 도보 8분", description: "속을 따뜻하고 깊게 덥혀주는 맑은 한우 곰탕 전문점입니다. 국물 한 숟가락 뜨자마자 알고리즘 테스트 스트레스가 확 씻겨 나갑니다.", image: "https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=800&q=80" },
            { id: "spot7", title: "대우부대찌개", category: "food", time: 10, address: "서울 강남구 테헤란로25길 34", direction: "멀티캠퍼스 역삼 ➡️ 역삼역 4번 출구 골목 도보 10분", description: "미나리를 산더미처럼 쌓아 한눈에 보기에도 싱그럽고 맛은 담백 시원합니다. 싸피 조원들과 대인원으로 푸짐하고 세련되게 점심을 먹고 싶을 때 강추합니다.", image: "https://images.unsplash.com/photo-1588166524941-3bf61a9c41db?auto=format&fit=crop&w=800&q=80" },
            { id: "spot8", title: "파브리끄 역삼 GFC점", category: "food", time: 5, address: "서울 강남구 테헤란로 152 GFC 지하1층", direction: "멀티캠퍼스 역삼 ➡️ 역삼역 GFC 빌딩 지하 도보 5분", description: "커피 플래터 위에 흐트러지지 않는 달콤 밀도 가득한 생크림 아인슈페너 전문점입니다. 당 충전이 필요할 때 단번에 확실하게 해결해 줍니다.", image: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&w=800&q=80" }
        ];

        let allSpots = [];
        let currentFilter = 'all';
        const spotsGrid = document.getElementById('spotsGrid');
        const spotsCountText = document.getElementById('spotsCount');

        function initSpotsData() {
            // 제보용 별도 저장소(ssafy_custom_spots)에서 목록만 안전하게 로드합니다.
            const savedCustomData = JSON.parse(localStorage.getItem('ssafy_custom_spots')) || [];
            allSpots = [...BASE_SPOTS, ...savedCustomData];
            renderSpots();
        }

        function renderSpots() {
            spotsGrid.innerHTML = '';
            const filtered = allSpots.filter(spot => currentFilter === 'all' || spot.category === currentFilter);
            spotsCountText.textContent = filtered.length;

            filtered.forEach(spot => {
                const card = document.createElement('div');
                card.className = "group bg-white dark:bg-darkCard rounded-2xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col justify-between hover:shadow-md transition-all";
                
                const isWalk = spot.category === 'walk';
                const tagClass = isWalk ? 'bg-blue-50 text-blue-500' : 'bg-amber-50 text-amber-500';
                const tagLabel = isWalk ? '🌲 산책로' : '🍲 대표 맛집';
                const isCustom = spot.id.startsWith('spot_custom_');

                card.innerHTML = `
                    <div class="space-y-3">
                        <div class="h-44 w-full overflow-hidden rounded-xl relative bg-slate-100 dark:bg-slate-800">
                            <img src="${spot.image}" alt="${spot.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs px-2.5 py-0.5 rounded-full font-semibold ${tagClass}">${tagLabel}</span>
                            <span class="text-xs text-slate-400 font-medium">🕒 도보 ${spot.time}분</span>
                        </div>
                        <h4 class="font-extrabold text-lg text-slate-800 dark:text-white flex items-center gap-1.5">
                            ${isCustom ? '<span class="text-indigo-500 text-sm font-bold">⭐ 제보스폿</span>' : ''}
                            <span>${spot.title}</span>
                        </h4>
                        <p class="text-xs text-indigo-500 font-bold truncate">📍 ${spot.address}</p>
                        <p class="text-[11px] text-slate-400 leading-none">${spot.direction}</p>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed line-clamp-2">${spot.description}</p>
                    </div>
                    <div class="flex justify-between items-center pt-4 mt-4 border-t border-slate-100 dark:border-slate-800">
                        <span class="text-xs text-slate-400">담아서 동선 짜기</span>
                        <button onclick="addToCourse('${spot.id}')" class="px-3 py-1.5 bg-primary-500 text-white text-xs font-bold rounded-xl hover:bg-primary-600 transition-colors">
                            ➕ 코스 담기
                        </button>
                    </div>
                `;
                spotsGrid.appendChild(card);
            });
        }

        function filterCategory(category) {
            currentFilter = category;
            const buttons = ['btnFilterAll', 'btnFilterWalk', 'btnFilterFood'];
            buttons.forEach(id => {
                const btn = document.getElementById(id);
                if (id === `btnFilter${category.charAt(0).toUpperCase() + category.slice(1)}` || (category==='all' && id==='btnFilterAll')) {
                    btn.className = "px-4 py-2 bg-primary-500 text-white rounded-xl text-xs font-semibold";
                } else {
                    btn.className = "px-4 py-2 bg-white dark:bg-darkCard text-slate-600 dark:text-slate-300 rounded-xl text-xs font-semibold border";
                }
            });
            renderSpots();
        }

        function addToCourse(id) {
            const spot = allSpots.find(s => s.id === id);
            if (!spot) return;

            let course = JSON.parse(localStorage.getItem('ssafy_course')) || [];
            if (!course.some(item => item.id === spot.id)) {
                course.push(spot);
                localStorage.setItem('ssafy_course', JSON.stringify(course));
                alert(`"${spot.title}"을(를) 코스 메이커에 담았습니다! [코스 플래너] 페이지에서 조립해 보세요.`);
            } else {
                alert("이미 코스 플래너에 등록되어 있는 장소입니다.");
            }
        }

        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
        window.onload = initSpotsData;
    </script>
</body>
</html>
