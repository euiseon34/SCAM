<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싸피 10분 마스터 - 장소 제보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#f0f7ff', 500: '#1c64d0' }, darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 min-h-screen">

    <header class="sticky top-0 z-[1000] backdrop-blur-md bg-white/80 dark:bg-darkBg/80 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="p-2 bg-primary-500 rounded-xl text-white shadow-md">🗺️</div>
                <h1 class="text-sm font-bold text-slate-900 dark:text-white leading-tight hidden sm:block">싸피 서울캠퍼스 10분 마스터</h1>
            </a>
            <nav class="flex items-center space-x-8 text-sm font-medium">
                <a href="index.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🗺️ 지도 탐색</a>
                <a href="spots.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🌲 전체 스폿</a>
                <a href="planner.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🧳 코스 플래너</a>
                <a href="report.html" class="text-primary-500 font-bold">➕ 장소 제보</a>
            </nav>
            <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">🌓 모드 전환</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12 space-y-6">
        <div class="space-y-1">
            <span class="px-2.5 py-0.5 bg-indigo-100 text-indigo-600 text-xs font-semibold rounded-full dark:bg-indigo-950/40">Spot Contributor</span>
            <h2 class="text-2xl font-bold tracking-tight">나만의 숨은 꿀장소 제보하기</h2>
            <p class="text-slate-400 text-xs">내가 아는 역삼동 꿀스폿을 등록하면 전체 스폿 목록에 즉시 추가되어 동기들과 공유할 수 있습니다.</p>
        </div>

        <form id="reportForm" onsubmit="submitForm(event)" class="bg-white dark:bg-darkCard rounded-2xl border border-slate-200 dark:border-slate-800 p-6 space-y-4 shadow-sm">
            <div class="space-y-2">
                <label class="block text-xs font-bold">📍 상세 주소 *</label>
                <div class="flex gap-2">
                    <input id="spotAddress" type="text" required placeholder="예: 역삼동 738-2 또는 강남구 테헤란로 212" class="flex-grow px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1">장소 이름 *</label>
                    <input id="spotTitle" type="text" required placeholder="예: 구름정원 카페" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">카테고리 *</label>
                    <select id="spotCategory" required class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white">
                        <option value="walk">🌲 숲 & 산책로</option>
                        <option value="food">🍲 로컬 맛집</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1">도보 시간 (분) *</label>
                    <input id="spotTime" type="number" min="1" max="30" required placeholder="예: 7" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">길 안내 가이드 *</label>
                    <input id="spotDirection" type="text" required placeholder="예: 멀티캠퍼스 정문 기준 도보 5분" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold mb-1">한 줄 매력 (핵심 하이라이트) *</label>
                <input id="spotHighlight" type="text" required placeholder="예: 달콤하고 쫀쫀한 인생 얼그레이 크림 슈페너 맛집" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white">
            </div>

            <div>
                <label class="block text-xs font-bold mb-1">장소 상세 설명 *</label>
                <textarea id="spotDesc" required rows="3" placeholder="싸피 동기들이 코딩 스트레스를 풀기 위해 방문할 때 도움이 되는 명확한 매력을 적어주세요." class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none dark:text-white"></textarea>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t dark:border-slate-800">
                <button type="button" onclick="location.href='index.html';" class="px-4 py-2.5 text-xs font-semibold text-slate-500">취소</button>
                <button type="submit" class="px-5 py-2.5 bg-primary-500 text-white text-xs font-bold rounded-xl shadow-md">제보 등록 완료</button>
            </div>
        </form>
    </main>

    <script>
        function submitForm(e) {
            e.preventDefault();

            const title = document.getElementById('spotTitle').value.trim();
            const category = document.getElementById('spotCategory').value;
            const time = parseInt(document.getElementById('spotTime').value);
            const address = document.getElementById('spotAddress').value.trim();
            const direction = document.getElementById('spotDirection').value.trim();
            const highlight = document.getElementById('spotHighlight').value.trim();
            const description = document.getElementById('spotDesc').value.trim();

            const lat = 37.5012746 + (Math.random() - 0.5) * 0.005;
            const lng = 127.0395857 + (Math.random() - 0.5) * 0.005;

            const customSpotId = `spot_custom_${Date.now()}`;
            const newSpot = {
                id: customSpotId,
                title: title,
                category: category,
                time: time,
                address: address,
                direction: direction,
                highlight: highlight,
                description: description,
                tip: "싸피 메이트가 직접 발로 뛰어 발굴한 소중한 로컬 정보입니다.",
                image: category === 'walk' 
                    ? "https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=800&q=80"
                    : "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=800&q=80",
                lat: lat,
                lng: lng
            };

            // 중요: 플래너(ssafy_course)가 아닌 전체 스폿 보관소(ssafy_custom_spots)에만 따로 저장합니다.
            let customSpots = JSON.parse(localStorage.getItem('ssafy_custom_spots')) || [];
            customSpots.push(newSpot);
            localStorage.setItem('ssafy_custom_spots', JSON.stringify(customSpots));

            alert(`🎉 장소 "${title}" 제보가 완료되었습니다!\n[전체 스폿] 목록에 즉시 반영되었습니다.`);
            
            // 등록 완료 후 전체 스폿 리스트 화면으로 이동합니다.
            location.href = "spots.html";
        }

        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
    </script>
</body>
</html>
