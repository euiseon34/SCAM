<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>싸피 10분 마스터 - 장소 제보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#f0f7ff', 500: '#1c64d0' }, darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 min-h-screen">

    <header class="sticky top-0 z-[1000] backdrop-blur-md bg-white/80 dark:bg-darkBg/80 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="p-2 bg-primary-500 rounded-xl text-white shadow-md">🗺️</div>
                <h1 class="text-sm font-bold text-slate-900 dark:text-white leading-tight hidden sm:block">싸피 서울캠퍼스 10분 마스터</h1>
            </a>
            <nav class="flex items-center space-x-8 text-sm font-medium">
                <a href="index.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🗺️ 지도 탐색</a>
                <a href="spots.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🌲 전체 스폿</a>
                <a href="planner.html" class="text-slate-600 hover:text-primary-500 dark:text-slate-300 transition-colors">🧳 코스 플래너</a>
                <a href="report.html" class="text-primary-500 font-bold">➕ 장소 제보</a>
            </nav>
            <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm">🌓</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12 space-y-6">
        <div class="space-y-1">
            <span class="px-2.5 py-0.5 bg-indigo-100 text-indigo-600 text-xs font-semibold rounded-full dark:bg-indigo-950/40">Spot Contributor</span>
            <h2 class="text-2xl font-bold tracking-tight">나만의 숨은 꿀장소 제보하기</h2>
            <p class="text-slate-400 text-xs">정밀 주소 검색 또는 지도 위 직접 클릭 방식으로 편리하게 추가해 주세요.</p>
        </div>

        <form onsubmit="alert('제보가 완료되었습니다!');" class="bg-white dark:bg-darkCard rounded-2xl border border-slate-200 dark:border-slate-800 p-6 space-y-4 shadow-sm">
            <div class="space-y-2">
                <label class="block text-xs font-bold">📍 주소 검색</label>
                <div class="flex gap-2">
                    <input type="text" placeholder="예: 역삼동 737 혹은 강남구 테헤란로 152" class="flex-grow px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none">
                    <button type="button" class="px-4 py-2 bg-primary-500 text-white rounded-xl text-xs font-semibold whitespace-nowrap">주소 검색</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold mb-1">장소 이름 *</label>
                    <input type="text" required placeholder="예: 구름정원 카페" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">카테고리 *</label>
                    <select required class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none">
                        <option value="walk">🌲 숲 & 산책로</option>
                        <option value="food">🍲 로컬 맛집</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold mb-1">장소 한 줄 매력 (핵심 하이라이트) *</label>
                <input type="text" required placeholder="예: 참나무 화덕에서 바로 구워 도우가 환상적인 맛" class="w-full px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl focus:outline-none">
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t">
                <button type="button" onclick="history.back();" class="px-4 py-2.5 text-xs font-semibold text-slate-500">취소</button>
                <button type="submit" class="px-5 py-2.5 bg-primary-500 text-white text-xs font-bold rounded-xl shadow-md">제보 등록 완료</button>
            </div>
        </form>
    </main>

    <script>
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
    </script>
</body>
</html>
